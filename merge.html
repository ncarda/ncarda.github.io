<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Mergely Diff Tool</title>
    <!-- Mergely -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mergely/5.4.7/mergely.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/mergely/5.4.7/mergely.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        /* IMPORTANT: Mergely requires an explicit height to render */
        #compare {
            height: 750px; 
            width: 100%;
        }
    </style>
</head>
<body>
  <div id="compare"></div>

  <script>
    const doc = new Mergely('#compare', {wrap_lines: true});
    doc.once('updated', () => {
      doc.lhs('the quick red fox\njumped over the hairy dog');
      doc.rhs('the quick brown fox\njumped over the lazy dog');
      // Scroll to first change on next update
      doc.once('updated', () => {
        doc.scrollToDiff('next');
      });
    });
  </script>
</body>
</html>
